spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: api-gateway
  cloud:
    gateway:
      httpclient:
        connect-timeout: 360000
        response-timeout: 360000
        ssl:
          useInsecureTrustManager: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders:
              - "*"
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE}
          predicates:
            - Path=/auth/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin
            - name: Retry
              args:
                retries: 3
                statuses: INTERNAL_SERVER_ERROR
                methods: GET,POST
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 300ms
                  factor: 2

        - id: user-service
          uri: ${USER_SERVICE}
          predicates:
            - Path=/user/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin

        - id: advertisement-service
          uri: ${ADVERTISEMENT_SERVICE}
          predicates:
            - Path=/product/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin
            - name: Retry
              args:
                retries: 3
                statuses: INTERNAL_SERVER_ERROR
                methods: GET,POST
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 300ms
                  factor: 2

        - id: chat-service
          uri: ${CHAT_SERVICE}
          predicates:
            - Path=/chat/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin
            - name: Retry
              args:
                retries: 3
                statuses: INTERNAL_SERVER_ERROR
                methods: GET,POST
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 300ms
                  factor: 2
logging:
  level:
    reactor.netty: INFO
    org.springframework.cloud.gateway: TRACE

auth:
  service:
    base-url: ${AUTH_SERVICE}
user:
  service:
    base-url: ${USER_SERVICE}


